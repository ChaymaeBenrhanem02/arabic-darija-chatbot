<svg width="680" height="680" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Logo Chatbot Médical Darija - Bleu nude</title>
<desc>Logo du chatbot médical multilingue en palette bleu clair nude</desc>

<style>
  .txt-ar { fill: #2c4a6e; font-family: serif; font-size: 27px; font-weight: bold; text-anchor: middle; }
  .txt-en { fill: #4a7fa5; font-family: sans-serif; font-size: 14px; font-weight: 500; text-anchor: middle; letter-spacing: 3.5px; }
  .txt-sub { fill: #8ab4cc; font-family: sans-serif; font-size: 12px; text-anchor: middle; letter-spacing: 2px; }
  .badge-txt { fill: #4a7fa5; font-family: sans-serif; font-size: 10.5px; font-weight: 500; text-anchor: middle; letter-spacing: 1.5px; }
</style>

<!-- Fond doux ivoire/nude -->
<circle cx="340" cy="340" r="320" fill="#eef4f9"/>

<!-- Anneau extérieur double -->
<circle cx="340" cy="340" r="304" fill="none" stroke="#b8d4e8" stroke-width="2.5"/>
<circle cx="340" cy="340" r="294" fill="none" stroke="#d6e8f4" stroke-width="1"/>

<!-- Cercle intérieur décoratif -->
<circle cx="340" cy="340" r="230" fill="#f7fbfe" stroke="#d0e6f3" stroke-width="1.5"/>

<!-- Points cardinaux sur l'anneau -->
<circle cx="340" cy="36" r="5" fill="#4a7fa5"/>
<circle cx="340" cy="644" r="5" fill="#4a7fa5"/>
<circle cx="36" cy="340" r="5" fill="#4a7fa5"/>
<circle cx="644" cy="340" r="5" fill="#4a7fa5"/>
<circle cx="133" cy="133" r="3.5" fill="#8ab4cc"/>
<circle cx="547" cy="133" r="3.5" fill="#8ab4cc"/>
<circle cx="133" cy="547" r="3.5" fill="#8ab4cc"/>
<circle cx="547" cy="547" r="3.5" fill="#8ab4cc"/>

<!-- Lignes décoratives subtiles -->
<line x1="340" y1="110" x2="340" y2="174" stroke="#c8dff0" stroke-width="1" opacity="0.6"/>
<line x1="340" y1="506" x2="340" y2="570" stroke="#c8dff0" stroke-width="1" opacity="0.6"/>
<line x1="110" y1="340" x2="174" y2="340" stroke="#c8dff0" stroke-width="1" opacity="0.6"/>
<line x1="506" y1="340" x2="570" y2="340" stroke="#c8dff0" stroke-width="1" opacity="0.6"/>

<!-- Croix médicale en fond décorative -->
<rect x="316" y="195" width="48" height="14" rx="7" fill="#b8d4e8" opacity="0.35"/>
<rect x="323" y="185" width="14" height="34" rx="7" fill="#b8d4e8" opacity="0.35"/>

<!-- Bulle principale -->
<rect x="178" y="178" width="310" height="195" rx="26" fill="#4a7fa5"/>
<rect x="190" y="185" width="280" height="50" rx="18" fill="#6a9fc0" opacity="0.3"/>
<polygon points="238,373 205,426 295,373" fill="#4a7fa5"/>

<!-- Lignes de texte simulées -->
<rect x="200" y="205" width="105" height="9" rx="4.5" fill="#eef4f9" opacity="0.9"/>
<rect x="200" y="221" width="80" height="9" rx="4.5" fill="#eef4f9" opacity="0.65"/>
<line x1="200" y1="244" x2="465" y2="244" stroke="#eef4f9" stroke-width="0.8" opacity="0.3"/>

<!-- Croix médicale dans bulle -->
<rect x="352" y="257" width="62" height="16" rx="8" fill="#eef4f9" opacity="0.9"/>
<rect x="360" y="246" width="16" height="38" rx="8" fill="#eef4f9" opacity="0.9"/>

<rect x="200" y="262" width="130" height="9" rx="4.5" fill="#eef4f9" opacity="0.9"/>
<rect x="200" y="278" width="100" height="9" rx="4.5" fill="#eef4f9" opacity="0.65"/>
<rect x="200" y="294" width="115" height="9" rx="4.5" fill="#eef4f9" opacity="0.5"/>
<rect x="200" y="320" width="8" height="28" rx="4" fill="#f0a070" opacity="0.8"/>
<rect x="216" y="322" width="95" height="8" rx="4" fill="#eef4f9" opacity="0.7"/>
<rect x="216" y="336" width="75" height="8" rx="4" fill="#eef4f9" opacity="0.5"/>

<!-- Petite bulle utilisateur -->
<rect x="385" y="390" width="155" height="68" rx="16" fill="#c8dff0"/>
<polygon points="540,400 572,392 540,418" fill="#c8dff0"/>
<rect x="400" y="406" width="88" height="8" rx="4" fill="#4a7fa5" opacity="0.6"/>
<rect x="400" y="420" width="65" height="8" rx="4" fill="#4a7fa5" opacity="0.45"/>
<rect x="400" y="434" width="75" height="8" rx="4" fill="#4a7fa5" opacity="0.35"/>

<!-- Icône micro -->
<circle cx="175" cy="420" r="24" fill="#deeef8"/>
<rect x="168" y="407" width="14" height="20" rx="7" fill="#4a7fa5"/>
<path d="M160 422 Q160 435 175 435 Q190 435 190 422" fill="none" stroke="#4a7fa5" stroke-width="2" stroke-linecap="round"/>
<line x1="175" y1="435" x2="175" y2="444" stroke="#4a7fa5" stroke-width="2" stroke-linecap="round"/>

<!-- Texte -->
<text x="340" y="510" class="txt-ar">طبيب الذكاء الاصطناعي</text>
<text x="340" y="546" class="txt-en">DARIJA MEDICAL AI</text>
<text x="340" y="570" class="txt-sub">عربية · دارجة · français</text>

<!-- Badge UM5 -->
<rect x="263" y="86" width="154" height="24" rx="12" fill="#deeef8"/>
<text x="340" y="102" class="badge-txt">UNIVERSITÉ UM5 · RABAT</text>
</svg>
